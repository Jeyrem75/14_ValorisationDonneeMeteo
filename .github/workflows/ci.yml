name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: cd backend && uv sync --frozen --extra dev
      - name: Ruff check
        run: cd backend && uv run ruff check . --ignore=DJ001 --exclude notebooks
      - name: Ruff format check
        run: cd backend && uv run ruff format --check . --exclude notebooks

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
          POSTGRES_DB: meteodb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    env:
      DEBUG: "true"
      SECRET_KEY: ci-secret-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: localhost
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: cd backend && uv sync --frozen --extra dev
      - name: Run migrations
        run: cd backend && uv run python manage.py migrate
      - name: Run tests
        run: cd backend && uv run pytest --junitxml=test-report.xml --cov=weather --cov-report=xml
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: backend/test-report.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: cd backend && uv sync --frozen
      - name: Export requirements
        run: cd backend && uv export --no-dev --format requirements-txt --output-file /tmp/requirements.txt
      - name: Run pip-audit
        run: uvx pip-audit -r /tmp/requirements.txt --format json --output backend/pip-audit-report.json
        continue-on-error: true
      - name: Run bandit
        run: cd backend && uvx bandit -r weather/ -f json -o bandit-report.json
        continue-on-error: true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-report
          path: |
            backend/pip-audit-report.json
            backend/bandit-report.json

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [lint, test, security-scan]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set image ref
        run: echo "IMAGE_REF=${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}-backend:${{ github.sha }}" >> $GITHUB_ENV

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.IMAGE_REF }}

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-report.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-report.sarif

      - name: Generate VEX (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: cyclonedx
          output: vex.json
          exit-code: "0"

      - name: Upload VEX file
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vex
          path: vex.json

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.sarif

      - name: Push to GHCR (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE_REF }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          docker push ${{ env.IMAGE_REF }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
